name: Codecov Analytics

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  codecov-analytics:
    name: Codecov Analytics
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      CODACY_API_TOKEN: ${{ secrets.CODACY_API_TOKEN }}
      CODACY_ORGANIZATION_PROVIDER: gh
      CODACY_USERNAME: Prekzursil
      CODACY_PROJECT_NAME: ${{ github.event.repository.name }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Run python coverage
        continue-on-error: true
        run: |
          mkdir -p coverage
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          python -m pip install pytest pytest-cov
          python -m pytest --cov=. --cov-report=xml:coverage/python-coverage.xml
      - name: Upload coverage to Codecov
        if: ${{ always() }}
        uses: codecov/codecov-action@v5
        with:
          files: coverage/python-coverage.xml
          flags: python
          fail_ci_if_error: true
          verbose: true
      - name: Upload coverage to Codacy
        if: ${{ always() }}
        uses: codacy/codacy-coverage-reporter-action@v1
        with:
          api-token: ${{ env.CODACY_API_TOKEN }}
          coverage-reports: coverage/python-coverage.xml
